  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1.7;color:var(--muted)\">Zur KI kam ich, weil ich Dinge einfacher machen wollte. Wenn eine Aufgabe jeden Tag Zeit frisst, gehört sie automatisiert – so einfach ist mein Ansatz.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"margin:0 0 10px;font-size:18px;font-weight:600\">Ich arbeite nachvollziehbar.<\u002Fh3>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.7;color:var(--muted)\">Automatisierte Tests, saubere Übergabe, Dokumentation. Sie bekommen keine Blackbox, sondern ein Werkzeug, das Sie verstehen und behalten.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WORKFLOW -->\n<section data-screen-label=\"Start – Workflow\" style=\"border-top:1px solid var(--line-soft)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:90px 24px\">\n    <div style=\"animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 30%\">\n      <h2 style=\"margin:0 0 14px;font-size:clamp(28px,3.6vw,40px);font-weight:700;letter-spacing:-.02em;line-height:1.15\">So sieht Automatisierung bei mir aus<\u002Fh2>\n      <p style=\"margin:0;max-width:560px;font-size:16px;line-height:1.7;color:var(--muted)\">Beispiel E-Mail-Automatisierung: vier Schritte – und der letzte gehört immer Ihnen.<\u002Fp>\n    <\u002Fdiv>\n    <div id=\"wf\" style=\"display:flex;align-items:flex-start;margin-top:56px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 28%\">\n      <div class=\"wfn\" style=\"flex:none;width:170px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);animation:node-pulse 4.8s ease-in-out infinite\">1<\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">E-Mail geht ein<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.5;color:var(--muted)\">Die Anfrage landet wie gewohnt im Postfach.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"wfc\" style=\"flex:1;height:2px;min-width:24px;margin:27px 8px 0;background:repeating-linear-gradient(90deg,var(--accent) 0 6px,transparent 6px 14px);background-size:14px 2px;animation:conveyor .9s linear infinite;opacity:.65\"><\u002Fdiv>\n      <div class=\"wfn\" style=\"flex:none;width:170px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);animation:node-pulse 4.8s ease-in-out infinite;animation-delay:1.2s\">2<\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">KI liest &amp; ordnet ein<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.5;color:var(--muted)\">Anliegen, Daten und Dringlichkeit werden erkannt.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"wfc\" style=\"flex:1;height:2px;min-width:24px;margin:27px 8px 0;background:repeating-linear-gradient(90deg,var(--accent) 0 6px,transparent 6px 14px);background-size:14px 2px;animation:conveyor .9s linear infinite;opacity:.65\"><\u002Fdiv>\n      <div class=\"wfn\" style=\"flex:none;width:170px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);animation:node-pulse 4.8s ease-in-out infinite;animation-delay:2.4s\">3<\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">Entwurf entsteht<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.5;color:var(--muted)\">Eine passende Antwort liegt automatisch bereit.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"wfc\" style=\"flex:1;height:2px;min-width:24px;margin:27px 8px 0;background:repeating-linear-gradient(90deg,var(--accent) 0 6px,transparent 6px 14px);background-size:14px 2px;animation:conveyor .9s linear infinite;opacity:.65\"><\u002Fdiv>\n      <div class=\"wfn\" style=\"flex:none;width:170px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:50%;border:1px solid var(--accent);background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);animation:node-pulse 4.8s ease-in-out infinite;animation-delay:3.6s\">4<\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">Sie geben frei<\u002Fdiv>\n          <div style=\"font-size:13.5px;line-height:1.5;color:var(--muted)\">Kein Versand ohne Ihr Okay – fertig in Sekunden.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- REFERENZ TEASER -->\n<section data-screen-label=\"Start – Referenz-Teaser\" style=\"border-top:1px solid var(--line-soft);background:var(--surface)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:90px 24px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 28%\">\n    <p style=\"margin:0 0 14px;font-size:15px;color:var(--accent);font-weight:600\">Aus der Praxis<\u002Fp>\n    <h2 style=\"margin:0 0 18px;font-size:clamp(28px,3.6vw,40px);font-weight:700;letter-spacing:-.02em;line-height:1.15\">Booking Email Check<\u002Fh2>\n    <p style=\"margin:0 0 36px;max-width:620px;font-size:16.5px;line-height:1.7;color:var(--muted)\">Eine Plattform, die Buchungs-E-Mails automatisch liest, einordnet und Antwortentwürfe vorbereitet – versendet wird erst, wenn ein Mensch freigibt. Läuft heute produktiv für Betriebe mit hohem Buchungsaufkommen.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:40px;margin-bottom:36px\">\n      <div>\n        <div style=\"font-size:32px;font-weight:700;letter-spacing:-.02em\">276+<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted);margin-top:4px\">automatisierte Tests<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:32px;font-weight:700;letter-spacing:-.02em\">60+<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted);margin-top:4px\">Releases in Produktion<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:32px;font-weight:700;letter-spacing:-.02em\">0<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted);margin-top:4px\">Mails ohne menschliche Freigabe<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"referenz.html\" style=\"color:var(--accent);font-weight:600;font-size:16px;text-decoration:none\" style-hover=\"text-decoration:underline\">Zur Case Study →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABLAUF -->\n<section data-screen-label=\"Start – Ablauf\" style=\"border-top:1px solid var(--line-soft)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:90px 24px\">\n    <h2 style=\"margin:0 0 44px;font-size:clamp(28px,3.6vw,40px);font-weight:700;letter-spacing:-.02em;line-height:1.15;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 30%\">So arbeiten wir zusammen<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:32px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 28%\">\n      <div style=\"border-top:2px solid var(--line);padding-top:22px\">\n        <div style=\"font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px\">Schritt 1<\u002Fdiv>\n        <h3 style=\"margin:0 0 8px;font-size:18px;font-weight:600\">Anfrage<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.65;color:var(--muted)\">Sie beschreiben Ihr Anliegen in drei Sätzen über das Formular – oder buchen direkt einen Termin.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line);padding-top:22px\">\n        <div style=\"font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px\">Schritt 2<\u002Fdiv>\n        <h3 style=\"margin:0 0 8px;font-size:18px;font-weight:600\">Kostenloses Erstgespräch<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.65;color:var(--muted)\">15–30 Minuten: Wir klären Ziel, Umfang und Machbarkeit. Sie bekommen eine ehrliche Einschätzung – auch, wenn sich etwas nicht lohnt.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top:2px solid var(--line);padding-top:22px\">\n        <div style=\"font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px\">Schritt 3<\u002Fdiv>\n        <h3 style=\"margin:0 0 8px;font-size:18px;font-weight:600\">Umsetzung<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.65;color:var(--muted)\">Iterative Entwicklung mit regelmäßigen Zwischenständen, Tests und sauberer Übergabe inklusive Dokumentation.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA BAND -->\n<section data-screen-label=\"Start – CTA\" style=\"border-top:1px solid var(--line-soft)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:90px 24px;animation:rise .8s cubic-bezier(.2,.7,.2,1) both;animation-timeline:view();animation-range:entry 0% entry 35%\">\n    <h2 style=\"margin:0 0 14px;font-size:clamp(26px,3.4vw,38px);font-weight:700;letter-spacing:-.02em;max-width:560px\">Erzählen Sie mir von Ihrem Projekt.<\u002Fh2>\n    <p style=\"margin:0 0 30px;font-size:16px;color:var(--muted)\">Kostenloses Erstgespräch, ehrliche Einschätzung, klares Angebot.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:12px\">\n      <a href=\"kontakt.html\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:16px;padding:14px 26px;border-radius:11px;text-decoration:none;transition:opacity .2s\" style-hover=\"opacity:.88\">Projekt anfragen<\u002Fa>\n      <a href=\"https://calendly.com/sjcode\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;background:transparent;color:var(--ink);font-weight:500;font-size:16px;padding:14px 26px;border-radius:11px;border:1px solid var(--line);text-decoration:none;transition:border-color .2s\" style-hover=\"border-color:var(--ink)\">Termin buchen ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"border-top:1px solid var(--line-soft)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:34px 24px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between\">\n    <span style=\"font-size:13.5px;color:var(--faint)\">© 2026 Codewerk · Sinan<\u002Fspan>\n    <span style=\"display:flex;gap:22px\">\n      <a href=\"impressum.html\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">Impressum<\u002Fa>\n      <a href=\"datenschutz.html\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">Datenschutz<\u002Fa>\n      <a href=\"https://github.com/siinanxd\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">GitHub<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/kahraman-sinan/\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">LinkedIn<\u002Fa>\n    <\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- STICKY CTA -->\n<a href=\"kontakt.html\" style=\"{{ stickyStyle }}\" style-hover=\"opacity:.9\">Projekt anfragen →<\u002Fa>\n\n<!-- COOKIE BANNER -->\n<sc-if value=\"{{ showCookie }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:120;padding:16px;display:flex;justify-content:center;pointer-events:none\">\n    <div style=\"pointer-events:auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.3);max-width:640px;width:100%;padding:22px 24px;animation:rise .5s cubic-bezier(.2,.7,.2,1) both\">\n      <h2 style=\"margin:0 0 8px;font-size:16px;font-weight:600\">Cookies auf dieser Website<\u002Fh2>\n      <p style=\"margin:0 0 16px;font-size:14px;line-height:1.6;color:var(--muted)\">Diese Website verwendet technisch notwendige Cookies. Optionale Cookies helfen zu verstehen, wie die Seite genutzt wird. Ihre Auswahl können Sie jederzeit ändern – Details in der <a href=\"datenschutz.html\" style=\"color:var(--accent)\">Datenschutzerklärung<\u002Fa>.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n        <button onclick=\"{{ cookieAll }}\" style=\"flex:1;min-width:150px;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:14.5px;padding:12px 18px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .2s\" style-hover=\"opacity:.88\">Alle akzeptieren<\u002Fbutton>\n        <button onclick=\"{{ cookieNecessary }}\" style=\"flex:1;min-width:150px;background:transparent;color:var(--ink);font-weight:600;font-size:14.5px;padding:12px 18px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-family:inherit;transition:border-color .2s\" style-hover=\"border-color:var(--ink)\">Nur notwendige<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;farbwelt&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Hell &amp; warm&quot;,&quot;Dunkel &amp; warm&quot;],&quot;default&quot;:&quot;Dunkel &amp; warm&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Farbwelt&quot;}}\">\nclass Component extends DCLogic {\n  state = { showSticky: false, consent: (typeof localStorage !== 'undefined' ? localStorage.getItem('cw-cookie-consent') : 'set') };\n\n  componentDidMount() {\n    this.applyTheme();\n    const hero = document.getElementById('hero');\n    if (hero && typeof IntersectionObserver !== 'undefined') {\n      this._io = new IntersectionObserver((es) => {\n        this.setState({ showSticky: !es[0].isIntersecting });\n      }, { threshold: 0.05 });\n      this._io.observe(hero);\n    }\n  }\n  componentDidUpdate(prev) {\n    if (prev.farbwelt !== this.props.farbwelt || prev.accent !== this.props.accent) this.applyTheme();\n  }\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n  }\n  applyTheme() {\n    const dark = (this.props.farbwelt ?? 'Hell & warm') === 'Dunkel & warm';\n    let hex = (this.props.accent || '#B5502A').replace('#', '');\n    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');\n    const n = parseInt(hex, 16);\n    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;\n    if (dark) { r = Math.min(255, r + 40); g = Math.min(255, g + 35); b = Math.min(255, b + 30); }\n    const vars = dark ? {\n      '--bg': '#211E19', '--surface': '#2A2620', '--ink': '#EDE7DC', '--muted': '#A69E8F',\n      '--faint': '#7E776B', '--line': 'rgba(237,231,220,.16)', '--line-soft': 'rgba(237,231,220,.09)',\n      '--accent-ink': '#231A13', '--nav-bg': 'rgba(33,30,25,.85)'\n    } : {\n      '--bg': '#F6F3EC', '--surface': '#FDFBF7', '--ink': '#23211C', '--muted': '#6B675D',\n      '--faint': '#918C80', '--line': 'rgba(35,33,28,.14)', '--line-soft': 'rgba(35,33,28,.08)',\n      '--accent-ink': '#FFF8F3', '--nav-bg': 'rgba(246,243,236,.85)'\n    };\n    vars['--accent'] = 'rgb(' + r + ',' + g + ',' + b + ')';\n    vars['--accent-soft'] = 'rgba(' + r + ',' + g + ',' + b + ',' + (dark ? '0.14' : '0.1') + ')';\n    const s = document.documentElement.style;\n    for (const k in vars) s.setProperty(k, vars[k]);\n  }\n  renderVals() {\n    const show = this.state.showSticky;\n    return {\n      showCookie: !this.state.consent,\n      cookieAll: () => { localStorage.setItem('cw-cookie-consent', 'all'); this.setState({ consent: 'all' }); },\n      cookieNecessary: () => { localStorage.setItem('cw-cookie-consent', 'necessary'); this.setState({ consent: 'necessary' }); },\n      stickyStyle: {\n        position: 'fixed', right: '22px', bottom: '22px', zIndex: 90,\n        display: 'inline-flex', alignItems: 'center', gap: '9px',\n        background: 'var(--ink)', color: 'var(--bg)', fontWeight: 600, fontSize: '15px',\n        padding: '13px 22px', borderRadius: '999px', textDecoration: 'none',\n        boxShadow: '0 8px 28px rgba(35,33,28,.22)',\n        transition: 'opacity .3s, transform .3s',\n        opacity: show ? 1 : 0,\n        transform: show ? 'translateY(0)' : 'translateY(14px)',\n        pointerEvents: show ? 'auto' : 'none'\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
