document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 rel=\"noopener\" style=\"color:var(--accent);font-weight:600;font-size:15.5px;text-decoration:none\" style-hover=\"text-decoration:underline\">Termin buchen ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"animation:rise .8s cubic-bezier(.2,.7,.2,1) .2s both\">\n    <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form onsubmit=\"{{ formSubmit }}\" style=\"background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;padding:32px;display:grid;gap:24px\">\n        <div style=\"display:grid;gap:10px\">\n          <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:4px 12px\">\n            <span style=\"font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap\">Schritt {{ stepNum }} von 4<\u002Fspan>\n            <span style=\"font-size:12.5px;color:var(--faint);white-space:nowrap\">{{ stepHint }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:4px;border-radius:999px;background:var(--line-soft);overflow:hidden\">\n            <div style=\"{{ barStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid;gap:14px\">\n            <div style=\"display:grid;gap:4px\">\n              <h2 style=\"margin:0;font-size:18px;font-weight:600\">Worum geht es?<\u002Fh2>\n              <p style=\"margin:0;font-size:13.5px;color:var(--faint)\">Mehrfachauswahl möglich – einfach antippen.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n                <button type=\"button\" onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;gap:22px\">\n            <div style=\"display:grid;gap:12px\">\n              <div style=\"display:grid;gap:4px\">\n                <h2 style=\"margin:0;font-size:18px;font-weight:600\">Wo stehen Sie gerade?<\u002Fh2>\n                <p style=\"margin:0;font-size:13.5px;color:var(--faint)\">Ihre Ausgangslage – eine Auswahl genügt.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n                <sc-for list=\"{{ situationOpts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                  <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;gap:12px\">\n              <h2 style=\"margin:0;font-size:18px;font-weight:600\">Wie eilig ist es?<\u002Fh2>\n              <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n                <sc-for list=\"{{ timelineOpts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                  <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;gap:14px\">\n            <div style=\"display:grid;gap:4px\">\n              <h2 style=\"margin:0;font-size:18px;font-weight:600\">Gibt es einen Budgetrahmen?<\u002Fh2>\n              <p style=\"margin:0;font-size:13.5px;color:var(--faint)\">Keine Festlegung – hilft mir nur, direkt einen passenden Vorschlag zu machen.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <sc-for list=\"{{ budgetOpts }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;gap:18px\">\n            <sc-if value=\"{{ hasSummary }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:13px;line-height:1.6;color:var(--muted);background:var(--bg);border:1px solid var(--line-soft);border-radius:10px;padding:10px 14px\">Ihre Auswahl: <span style=\"color:var(--ink);font-weight:500\">{{ summaryText }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:grid;gap:8px\">\n              <label for=\"cw-msg\" style=\"font-size:14px;font-weight:500;color:var(--ink)\">Kurze Projektbeschreibung<\u002Flabel>\n              <textarea id=\"cw-msg\" required=\"\" rows=\"4\" value=\"{{ formMsg }}\" onchange=\"{{ onMsg }}\" placeholder=\"Zwei, drei Sätze genügen – was soll entstehen, was nervt heute?\" style=\"background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:15.5px;color:var(--ink);outline:none;resize:vertical;min-height:100px;font-family:inherit;line-height:1.6;transition:border-color .2s,box-shadow .2s\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"display:grid;gap:8px\">\n              <label for=\"cw-name\" style=\"font-size:14px;font-weight:500;color:var(--ink)\">Name<\u002Flabel>\n              <input id=\"cw-name\" required=\"\" value=\"{{ formName }}\" onchange=\"{{ onName }}\" placeholder=\"Ihr Name\" style=\"background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:15.5px;color:var(--ink);outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)\">\n            <\u002Fdiv>\n            <div style=\"display:grid;gap:8px\">\n              <label for=\"cw-email\" style=\"font-size:14px;font-weight:500;color:var(--ink)\">E-Mail<\u002Flabel>\n              <input id=\"cw-email\" type=\"email\" required=\"\" value=\"{{ formEmail }}\" onchange=\"{{ onEmail }}\" placeholder=\"name@firma.de\" style=\"background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:15.5px;color:var(--ink);outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)\">\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:16px;padding:15px;border:none;border-radius:11px;cursor:pointer;font-family:inherit;transition:opacity .2s\" style-hover=\"opacity:.88\">{{ submitLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:rgb(221,115,72);background:var(--accent-soft);border-radius:10px;padding:12px 14px\">Senden fehlgeschlagen – bitte erneut versuchen oder direkt an <a href=\"mailto:kontakt@sjcode.de\" style=\"color:rgb(221,115,72);font-weight:600\">kontakt@sjcode.de<\u002Fa> schreiben.<\u002Fp>\n            <\u002Fsc-if>\n            <p style=\"margin:0;font-size:12.5px;line-height:1.6;color:var(--faint)\">Mit dem Absenden stimmen Sie der Verarbeitung Ihrer Angaben zur Beantwortung der Anfrage zu. Details in der <a href=\"datenschutz.html\" style=\"color:var(--muted)\">Datenschutzerklärung<\u002Fa>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n          <sc-if value=\"{{ canBack }}\" hint-placeholder-val=\"{{ false }}\">\n            <button type=\"button\" onclick=\"{{ goBack }}\" style=\"background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:500;padding:10px 4px;cursor:pointer;font-family:inherit;transition:color .2s\" style-hover=\"color:var(--ink)\">← Zurück<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notLast }}\" hint-placeholder-val=\"{{ true }}\">\n            <button type=\"button\" onclick=\"{{ goNext }}\" style=\"margin-left:auto;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:15px;padding:12px 26px;border:none;border-radius:11px;cursor:pointer;font-family:inherit;transition:opacity .2s\" style-hover=\"opacity:.88\">Weiter →<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:56px 32px;text-align:center;animation:pop .5s cubic-bezier(.2,.9,.3,1.3) both\">\n        <div style=\"width:64px;height:64px;border-radius:50%;background:var(--accent-soft);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:var(--accent);animation:pop .6s cubic-bezier(.2,.9,.3,1.3) .1s both\">✓<\u002Fdiv>\n        <h2 style=\"margin:0 0 10px;font-size:21px;font-weight:600\">Danke für Ihre Anfrage!<\u002Fh2>\n        <p style=\"margin:0 0 24px;font-size:15px;line-height:1.65;color:var(--muted)\">Ich melde mich innerhalb von 24 Stunden persönlich bei Ihnen.<\u002Fp>\n        <button onclick=\"{{ resetForm }}\" style=\"background:transparent;border:1px solid var(--line);color:var(--ink);font-size:14px;font-weight:500;padding:10px 20px;border-radius:10px;cursor:pointer;font-family:inherit;transition:border-color .2s\" style-hover=\"border-color:var(--ink)\">Neue Anfrage<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"border-top:1px solid var(--line-soft)\">\n  <div style=\"max-width:1080px;margin:0 auto;padding:34px 24px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between\">\n    <span style=\"font-size:13.5px;color:var(--faint)\">© 2026 Codewerk · Sinan<\u002Fspan>\n    <span style=\"display:flex;gap:22px\">\n      <a href=\"impressum.html\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">Impressum<\u002Fa>\n      <a href=\"datenschutz.html\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">Datenschutz<\u002Fa>\n      <a href=\"https://github.com/siinanxd\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">GitHub<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/kahraman-sinan/\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s\" style-hover=\"color:var(--ink)\">LinkedIn<\u002Fa>\n    <\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n<!-- COOKIE BANNER -->\n<sc-if value=\"{{ showCookie }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:120;padding:16px;display:flex;justify-content:center;pointer-events:none\">\n    <div style=\"pointer-events:auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.3);max-width:640px;width:100%;padding:22px 24px;animation:rise .5s cubic-bezier(.2,.7,.2,1) both\">\n      <h2 style=\"margin:0 0 8px;font-size:16px;font-weight:600\">Cookies auf dieser Website<\u002Fh2>\n      <p style=\"margin:0 0 16px;font-size:14px;line-height:1.6;color:var(--muted)\">Diese Website verwendet technisch notwendige Cookies. Optionale Cookies helfen zu verstehen, wie die Seite genutzt wird. Ihre Auswahl können Sie jederzeit ändern – Details in der <a href=\"datenschutz.html\" style=\"color:var(--accent)\">Datenschutzerklärung<\u002Fa>.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n        <button onclick=\"{{ cookieAll }}\" style=\"flex:1;min-width:150px;background:var(--accent);color:var(--accent-ink);font-weight:600;font-size:14.5px;padding:12px 18px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .2s\" style-hover=\"opacity:.88\">Alle akzeptieren<\u002Fbutton>\n        <button onclick=\"{{ cookieNecessary }}\" style=\"flex:1;min-width:150px;background:transparent;color:var(--ink);font-weight:600;font-size:14.5px;padding:12px 18px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-family:inherit;transition:border-color .2s\" style-hover=\"border-color:var(--ink)\">Nur notwendige<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 1, selectedChips: [], situation: '', timeline: '', budget: '', name: '', email: '', msg: '', sending: false, submitted: false, consent: (typeof localStorage !== 'undefined' ? localStorage.getItem('cw-cookie-consent') : 'set') };\n\n  componentWillUnmount() {\n    if (this._t) clearTimeout(this._t);\n  }\n  toggleChip(label) {\n    this.setState(s => ({\n      selectedChips: s.selectedChips.includes(label)\n        ? s.selectedChips.filter(c => c !== label)\n        : s.selectedChips.concat(label)\n    }));\n  }\n  pillStyle(on) {\n    return {\n      padding: '11px 18px', borderRadius: '999px', cursor: 'pointer', fontSize: '14.5px', whiteSpace: 'nowrap',\n      fontFamily: 'inherit', transition: 'border-color .2s, background .2s, color .2s',\n      border: '1px solid ' + (on ? 'var(--accent)' : 'var(--line)'),\n      background: on ? 'var(--accent-soft)' : 'transparent',\n      color: on ? 'var(--accent)' : 'var(--muted)',\n      fontWeight: on ? 600 : 400\n    };\n  }\n  single(key, labels) {\n    return labels.map(label => ({\n      label,\n      onClick: () => this.setState({ [key]: this.state[key] === label ? '' : label }),\n      style: this.pillStyle(this.state[key] === label)\n    }));\n  }\n  renderVals() {\n    const s = this.state;\n    const chips = ['Website', 'KI / Automatisierung', 'Individuelle Software', 'E-Mail-Automatisierung', 'Weiß ich noch nicht'].map(label => ({\n      label,\n      onClick: () => this.toggleChip(label),\n      style: this.pillStyle(s.selectedChips.includes(label))\n    }));\n    const summary = [s.selectedChips.join(', '), s.situation, s.timeline, s.budget].filter(Boolean).join(' · ');\n    const hints = { 1: 'Dauert insgesamt ca. 2 Minuten', 2: 'Antippen genügt', 3: 'Optional – gern überspringen', 4: 'Fast geschafft' };\n    return {\n      stepNum: s.step,\n      stepHint: hints[s.step],\n      barStyle: { height: '100%', width: (s.step / 4 * 100) + '%', background: 'var(--accent)', borderRadius: '999px', transition: 'width .35s cubic-bezier(.2,.7,.2,1)' },\n      isStep1: s.step === 1, isStep2: s.step === 2, isStep3: s.step === 3, isStep4: s.step === 4,\n      canBack: s.step > 1,\n      notLast: s.step < 4,\n      goBack: () => this.setState(st => ({ step: Math.max(1, st.step - 1) })),\n      goNext: () => this.setState(st => ({ step: Math.min(4, st.step + 1) })),\n      situationOpts: this.single('situation', ['Neu starten', 'Bestehendes verbessern', 'Etwas Vorhandenes ersetzen']),\n      timelineOpts: this.single('timeline', ['So schnell wie möglich', 'In 1–3 Monaten', 'Flexibel']),\n      budgetOpts: this.single('budget', ['Bis 3.000 €', '3.000–10.000 €', 'Über 10.000 €', 'Noch unklar']),\n      hasSummary: !!summary,\n      summaryText: summary,\n      showCookie: !this.state.consent,\n      cookieAll: () => { localStorage.setItem('cw-cookie-consent', 'all'); this.setState({ consent: 'all' }); },\n      cookieNecessary: () => { localStorage.setItem('cw-cookie-consent', 'necessary'); this.setState({ consent: 'necessary' }); },\n      chips,\n      formName: this.state.name,\n      formEmail: this.state.email,\n      formMsg: this.state.msg,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      onMsg: (e) => this.setState({ msg: e.target.value }),\n      submitLabel: this.state.sending ? 'Wird gesendet …' : 'Anfrage senden',\n      formSubmit: (e) => {\n        e.preventDefault();\n        if (this.state.sending || this.state.submitted) return;\n        this.setState({ sending: true, error: false });\n        const payload = {\n          name: s.name,\n          email: s.email,\n          nachricht: s.msg,\n          themen: s.selectedChips.join(', ') || '–',\n          ausgangslage: s.situation || '–',\n          zeitrahmen: s.timeline || '–',\n          budget: s.budget || '–',\n          _subject: 'Neue Projektanfrage über sjcode.de'\n        };\n        const endpoint = 'https://formspree.io/f/mojorgeb';\n        fetch(endpoint, {\n          method: 'POST',\n          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n          body: JSON.stringify(payload)\n        })\n          .then(r => { if (!r.ok) throw new Error('send failed'); this.setState({ sending: false, submitted: true }); })\n          .catch(() => this.setState({ sending: false, error: true }));\n      },\n      hasError: !!s.error,\n      resetForm: () => this.setState({ submitted: false, step: 1, selectedChips: [], situation: '', timeline: '', budget: '', name: '', email: '', msg: '' }),\n      notSubmitted: !this.state.submitted,\n      submitted: this.state.submitted\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
